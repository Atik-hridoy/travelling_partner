        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 40px -20px rgba(79, 55, 138, 0.05);
        }
        .ai-bubble {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(103, 80, 164, 0.15);

            animation: floating 6s ease-in-out infinite;
        }

            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .waveform-bar {
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }
        .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform-bar:nth-child(5) { animation-delay: 0.4s; }
    </style>

<!-- Micro-interactions Script -->
<script>
        // Simple micro-interaction for the voice button
        const voiceBtn = document.getElementById('voiceBtn');
        const waveform = document.getElementById('waveform');
        let isListening = false;

        voiceBtn.addEventListener('click', () => {
            isListening = !isListening;
            if(isListening) {
                waveform.classList.remove('hidden');
                voiceBtn.classList.add('bg-primary-container/30');
            } else {
                waveform.classList.add('hidden');
                voiceBtn.classList.remove('bg-primary-container/30');
            }
        });

        // Destination chip interaction
        const chips = document.querySelectorAll('button.font-label-sm');
        const input = document.querySelector('input');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                input.value = `I want to visit ${chip.innerText}...`;
                input.focus();
            });
        });
    </script>
