</div>

<nav class="fixed bottom-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-t border-outline-variant/10 rounded-t-xl shadow-lg shadow-primary/5">

<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-opacity duration-200">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-label-sm text-label-sm">Back</span>
</button>
<div class="flex flex-col items-center justify-center text-primary font-bold">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">horizontal_rule</span>

</div>
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-opacity duration-200 group" onclick="nextStep()">
<div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white mb-1 shadow-lg shadow-primary/20 group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
<span class="font-label-sm text-label-sm">Next</span>
</button>
</div>

<script>
        const slider = document.getElementById('budget-slider');
        const costDisplay = document.getElementById('estimated-cost');
        const descDisplay = document.getElementById('budget-desc');
        const currencySelector = document.getElementById('currency-selector');
        const aiTyping = document.getElementById('ai-typing');

        const budgetLevels = {
            1: { cost: 150, label: "Budget", desc: "Backpacker style, hostels, and street food.", includes: ["Hostels", "Walking", "Street Food"] },
            2: { cost: 450, label: "Comfort", desc: "Essential comfort and local gems.", includes: ["3★ Hotels", "Public Transport", "Bistros"] },
            3: { cost: 1200, label: "Luxury", desc: "Premium stays and private experiences.", includes: ["5★ Resorts", "Private Drivers", "Fine Dining"] },
            4: { cost: 2500, label: "Ultra Luxury", desc: "Ultimate exclusivity and bespoke service.", includes: ["Palatial Suites", "Helicopters", "Michelin Dining"] }
        };

        const exchangeRates = {
            "USD": 1,
            "EUR": 0.92,
            "JPY": 150
        };

        function updateDisplay() {
            const val = slider.value;
            const currency = currencySelector.value;
            const level = budgetLevels[val];
            
            let symbol = "$";
            if (currency === "EUR") symbol = "€";
            if (currency === "JPY") symbol = "¥";

            const localCost = Math.round(level.cost * exchangeRates[currency]);
            costDisplay.innerText = `${symbol}${localCost.toLocaleString()}`;
            descDisplay.innerText = level.desc;

            // Update label colors
            const labels = document.querySelectorAll('.relative.py-4 span');
            labels.forEach((span, i) => {
                if (i + 1 == val) {
                    span.classList.add('text-primary');
                    span.classList.remove('text-on-surface-variant');
                } else {
                    span.classList.remove('text-primary');
                    span.classList.add('text-on-surface-variant');
                }
            });
        }

        slider.addEventListener('input', updateDisplay);
        currencySelector.addEventListener('change', updateDisplay);

        function selectTraveler(btn) {
            document.querySelectorAll('button.glass').forEach(b => b.classList.remove('active-card'));
            btn.classList.add('active-card');
            
            // Show Nova response
            aiTyping.style.opacity = "1";
            aiTyping.style.transform = "translateY(0)";
            
            setTimeout(() => {
                aiTyping.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-primary-fixed flex-shrink-0 flex items-center justify-center mt-1">
                        <span class="material-symbols-outlined text-primary text-[18px]" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
                    </div>
                    <div class="glass p-5 rounded-2xl rounded-tl-none max-w-[85%]">
                        <p class="font-body-lg text-on-surface">Excellent choice. I'm tailoring the itinerary for a ${btn.innerText.toLowerCase()} trip with a ${budgetLevels[slider.value].label.toLowerCase()} touch.</p>
                    </div>
                `;
            }, 1200);
        }

        function nextStep() {
            // Animation for transition
            document.body.style.opacity = "0";
            document.body.style.transition = "opacity 0.5s ease";
            setTimeout(() => {
                console.log("Navigating to next step...");
            }, 500);
        }

        // Initialize
        updateDisplay();
    </script>
</body></html>
